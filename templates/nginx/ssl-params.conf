# =============================================================================
# ssl-params.conf — Parâmetros TLS/SSL seguros (snippet Nginx)
# Incluído em: /etc/nginx/snippets/ssl-params.conf
# Uso nos vhosts: include snippets/ssl-params.conf;
# =============================================================================

# ── Protocolos permitidos (somente TLS 1.2 e 1.3) ────────────────────────
ssl_protocols TLSv1.2 TLSv1.3;

# ── Conjunto de cifras seguras ─────────────────────────────────────────────
# Compatível com clientes modernos e passa em testes SSL Labs
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

# Deixa o cliente escolher a cifra (recomendado para TLS 1.3)
ssl_prefer_server_ciphers off;

# ── Parâmetros Diffie-Hellman ──────────────────────────────────────────────
# Caminho atualizado automaticamente pelo script 05-ssl.sh
ssl_dhparam /etc/ssl/local/dhparam.pem;

# ── Cache de sessão SSL (melhora performance em reconexões) ───────────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── OCSP Stapling ─────────────────────────────────────────────────────────
# Desativado para certificados autoassinados (sem CA pública).
# Ative se migrar para Let's Encrypt:
# ssl_stapling on;
# ssl_stapling_verify on;
# resolver 8.8.8.8 1.1.1.1 valid=300s;
# resolver_timeout 5s;
