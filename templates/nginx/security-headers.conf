# =============================================================================
# security-headers.conf — Cabeçalhos HTTP de segurança (snippet Nginx)
# Incluído em: /etc/nginx/snippets/security-headers.conf
# Uso nos vhosts: include snippets/security-headers.conf;
# =============================================================================

# ── Proteção contra clickjacking ──────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;

# ── Impede detecção automática de MIME type ───────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── Proteção XSS embutida (legado, mas ainda útil em browsers antigos) ────
add_header X-XSS-Protection "1; mode=block" always;

# ── Controla informações de referência ───────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Desativa acesso a recursos sensíveis do dispositivo ──────────────────
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# ── HSTS: força HTTPS por 1 ano (incluindo subdomínios) ──────────────────
# Remove a linha abaixo se o certificado for autoassinado e
# você não quiser que o browser "persista" o HTTPS:
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ── Content-Security-Policy (básico — ajuste conforme necessário) ─────────
# Esta política permite scripts e estilos apenas da mesma origem.
# Para sites com CDN/Google Fonts/jQuery externo, ajuste conforme necessário.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;
