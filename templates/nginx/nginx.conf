# =============================================================================
# nginx.conf — Configuração principal do Nginx (server-setup)
# =============================================================================

user www-data;

# Usa todos os núcleos de CPU disponíveis
worker_processes auto;

# Máximo de descritores de arquivo por processo worker
worker_rlimit_nofile 65535;

pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    # Máximo de conexões simultâneas por worker
    worker_connections 1024;

    # Aceita múltiplas conexões por vez (melhor performance)
    multi_accept on;

    # Melhor driver de eventos no Linux
    use epoll;
}

http {

    # ── Básico ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;

    # Oculta a versão do Nginx em headers e páginas de erro
    server_tokens off;

    # ── MIME types ────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Força charset UTF-8
    charset utf-8;

    # ── Limites de upload ─────────────────────────────────────────────────
    client_max_body_size    64m;
    client_body_buffer_size 128k;
    client_header_timeout   60s;
    client_body_timeout     60s;
    send_timeout            60s;

    # ── Buffers FastCGI ───────────────────────────────────────────────────
    fastcgi_buffers         8 16k;
    fastcgi_buffer_size     32k;
    fastcgi_connect_timeout 60s;
    fastcgi_send_timeout    120s;
    fastcgi_read_timeout    120s;

    # ── Cache FastCGI (PHP) ───────────────────────────────────────────────
    fastcgi_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=PHP_CACHE:10m
        inactive=60m
        max_size=100m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    # ── Logs ──────────────────────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip (compressão de resposta) ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        application/x-font-opentype
        image/svg+xml
        font/eot
        font/opentype
        font/otf;

    # ── Proteção contra ataques comuns ────────────────────────────────────

    # Ignora requisições com Host inválido (previne host header injection)
    server {
        listen      80  default_server;
        listen      443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
        ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

        return 444;
    }

    # ── Virtual Hosts ─────────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
